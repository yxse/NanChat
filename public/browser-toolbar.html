<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toolbar</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      .bar {
        display: flex;
        align-items: center;
        height: 100%;
        background: #1f1f1f;
        color: #fff;
        -webkit-user-select: none;
        user-select: none;
      }
      /* The draggable region fills the bar and moves the window. */
      .drag {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 10px;
        height: 100%;
        min-width: 0;
        padding: 0 12px;
      }
      .url {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        color: #b5b5b5;
      }
      /* Custom action button (non-draggable). */
      .action {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        background: transparent;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      .action svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
      .action:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .action:active {
        background: rgba(255, 255, 255, 0.2);
      }
      /* Window control buttons (minimize / maximize / close). */
      .controls {
        flex: 0 0 auto;
        display: flex;
        align-items: stretch;
        height: 100%;
      }
      .ctrl {
        width: 46px;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: #e5e5e5;
        cursor: pointer;
        padding: 0;
      }
      .ctrl svg {
        width: 11px;
        height: 11px;
        stroke: currentColor;
        stroke-width: 1.4;
        fill: none;
      }
      .ctrl:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .ctrl.close:hover {
        background: #e81123;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="drag" data-tauri-drag-region>
        <span class="url" id="url" data-tauri-drag-region></span>
        <button class="action" id="action" type="button" title="Share" aria-label="Share">
          <svg viewBox="0 0 1024 1024">
            <path d="M752 664c-28.5 0-54.8 10-75.4 26.7L469.4 540.8a160.68 160.68 0 0 0 0-57.6l207.2-149.9C697.2 350 723.5 360 752 360c66.2 0 120-53.8 120-120s-53.8-120-120-120-120 53.8-120 120c0 11.6 1.6 22.7 4.7 33.3L439.9 415.8C410.7 377.1 364.3 352 312 352c-88.4 0-160 71.6-160 160s71.6 160 160 160c52.3 0 98.7-25.1 127.9-63.8l196.8 142.5c-3.1 10.6-4.7 21.8-4.7 33.3 0 66.2 53.8 120 120 120s120-53.8 120-120-53.8-120-120-120zm0-476c28.7 0 52 23.3 52 52s-23.3 52-52 52-52-23.3-52-52 23.3-52 52-52zM312 600c-48.5 0-88-39.5-88-88s39.5-88 88-88 88 39.5 88 88-39.5 88-88 88zm440 236c-28.7 0-52-23.3-52-52s23.3-52 52-52 52 23.3 52 52-23.3 52-52 52z" />
          </svg>
        </button>
      </div>
      <div class="controls">
        <button class="ctrl" id="min" type="button" title="Minimize" aria-label="Minimize">
          <svg viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" /></svg>
        </button>
        <button class="ctrl" id="max" type="button" title="Maximize" aria-label="Maximize">
          <svg viewBox="0 0 12 12"><rect x="2.5" y="2.5" width="7" height="7" /></svg>
        </button>
        <button class="ctrl close" id="close" type="button" title="Close" aria-label="Close">
          <svg viewBox="0 0 12 12"><line x1="2.5" y1="2.5" x2="9.5" y2="9.5" /><line x1="9.5" y1="2.5" x2="2.5" y2="9.5" /></svg>
        </button>
      </div>
    </div>
    <script src="browser-toolbar.js"></script>
  </body>
</html>
